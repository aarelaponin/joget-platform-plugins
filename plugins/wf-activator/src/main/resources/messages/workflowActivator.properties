# WorkflowActivator Plugin Messages
# English (default) messages for the WorkflowActivator plugin

# Plugin basic information
plugin.name=Workflow Activator
plugin.description=Automatically invoke workflow processes after form submission
plugin.version=8.0.1

# Configuration section titles
config.workflow.title=Workflow Configuration
config.datamapping.title=Data Mapping  
config.advanced.title=Advanced Options

# Property labels and descriptions
property.processDefId.label=Process Definition ID
property.processDefId.description=The exact process definition ID (e.g., myProcess:1:latest). Leave empty to use Process Name instead.

property.processName.label=Process Name
property.processName.description=The process name to invoke. Used if Process Definition ID is not specified.

property.runMode.label=Execution Mode
property.runMode.description=How the workflow should be executed
property.runMode.sync=Synchronous (Wait for start)
property.runMode.async=Asynchronous (Background execution)

property.waitForCompletion.label=Wait for Process Completion
property.waitForCompletion.description=If enabled, the plugin will wait for the entire workflow to complete before returning (only for simple workflows)

property.passFormData.label=Pass Form Data to Workflow
property.passFormData.description=Automatically pass all form field values as workflow variables

property.participantMapping.label=Participant Assignment
property.participantMapping.description=Workflow participant/user to assign the first activity to. Can use hash variables like #currentUser.username#

property.customVariables.label=Custom Workflow Variables  
property.customVariables.description=Additional workflow variables in format: var1=value1;var2=value2. Supports hash variables.

property.enableLogging.label=Enable Detailed Logging
property.enableLogging.description=Log detailed information about workflow activation for debugging

property.errorHandling.label=Error Handling Strategy
property.errorHandling.description=How to handle errors during workflow activation
property.errorHandling.log=Log error and continue
property.errorHandling.abort=Abort form submission on error  
property.errorHandling.retry=Retry workflow activation once

property.condition.label=Activation Condition
property.condition.description=BeanShell expression that must evaluate to true for workflow to be triggered. Leave empty to always trigger.

# Runtime messages
message.workflow.started=Successfully started workflow process: {0}
message.workflow.failed=Failed to start workflow process
message.workflow.async.started=Asynchronous workflow thread started  
message.variables.added=Added {0} form fields as workflow variables
message.condition.not.met=Activation condition not met, skipping workflow invocation

# Error messages
error.missing.processdef=Process Definition ID or Process Name must be specified
error.resolve.processdef=Could not resolve Process Definition ID
error.workflow.execution=Error executing workflow: {0}
error.variable.preparation=Error preparing workflow variables
error.custom.variables=Error parsing custom variables