# Country-invariant procedure skeleton - Debt Management (collection & enforcement).
# Cited to VERIFIED DM-spec ids AND the external TADAT Field Guide 2019 indicators (POA5 payment/
# arrears: P5-15/17/19/20; POA7 disputes: P7-23/24/25 - tadat.org, published) + DMBB features.
procedures:
- id: debt-case-creation
  name: Create/consolidate a debt case from the ledger
  kind: invariant
  demands:
  - source_of_truth
  parameters:
  - scan_rules
  - gold_binding
  - stream_key
  sources:
  - WF-FR-001
  - BR-DM-002
  - BR-DM-004
  - F02
  - F03
- id: debt-categorisation
  name: Categorise a debt (enforcement band)
  kind: invariant
  demands:
  - threshold
  parameters:
  - category_bands
  - category_recompute
  sources:
  - DM-FR-004
  - F01
  - TADAT/P5-19
- id: escalation
  name: Escalate (reminders, notices, final demand)
  kind: invariant
  demands:
  - lifecycle
  parameters:
  - escalation_offsets
  - escalation_actions
  sources:
  - BR-DM-005
  - BR-DM-011
  - F04
  - F05
  - TADAT/P5-20
- id: enforcement-action
  name: Select and execute an enforcement instrument
  kind: invariant
  demands:
  - steps
  parameters:
  - enforcement_matrix
  - instrument_set
  sources:
  - DM-FR-018
  - DM-FR-019
  - DM-FR-020
  - BR-DM-004
  - F07
  - F08
  - TADAT/P5-20
- id: instalment-arrangement
  name: Grant and manage an instalment arrangement
  kind: invariant
  demands:
  - lifecycle
  parameters:
  - instalment_rules
  - auto_approval
  sources:
  - BR-DM-021
  - BR-DM-025
  - BR-DM-027
  - F06
  - TADAT/P5-20
- id: write-off
  name: Write off (and reversal) of uncollectible debt
  kind: invariant
  demands:
  - lifecycle
  parameters:
  - writeoff_bands
  - reversal_policy
  sources:
  - DM-FR-043
  - BR-DM-022
  - F09
  - TADAT/P5-19
- id: default-assessment
  name: Raise a default / estimated assessment
  kind: invariant
  demands:
  - threshold
  parameters:
  - assessment_basis
  sources:
  - F10
- id: objection-handling
  name: Handle an objection / dispute against enforcement
  kind: invariant
  demands:
  - lifecycle
  parameters:
  - objection_rules
  sources:
  - F05
  - TADAT/P7-23
  - TADAT/P7-24
  - TADAT/P7-25
- id: payment-application
  name: Apply a payment to a debt
  kind: invariant
  demands:
  - source_of_truth
  parameters:
  - allocation_order
  - overpayment
  sources:
  - F13
  - TADAT/P5-15
  - TADAT/P5-17
- id: contact-visit
  name: Contact and field-visit management
  kind: invariant
  demands:
  - steps
  parameters:
  - contact_applicability
  sources:
  - DM-FR-019
  - DM-FR-020
  - F14
  - TADAT/P5-20
- id: collection-mi
  name: Collection management information and reporting
  kind: parameterised
  demands: []
  parameters:
  - kpi_set
  - rag_bands
  - aging_bands
  sources:
  - RPT-FR-001
  - RPT-FR-008
  - F11
  - F12
  - TADAT/P5-19
