  answer: OPEN — to be answered in elicitation.
  status: TO_CONFIRM
  owner: TBD
  source:
    kind: assumption
    ref: unanswered ecosystem_shared_meaning template slot (required_authority)
  x-probes: &id001
  - 'Bucket (Register §1): R shared reference / M master entity / C module config / P platform? FLAGged entries stop at TO-CONFIRM.'
  - 'Fact ownership: which module writes this fact (one fact, one writer); everyone else reads?'
  - 'Binding: bound to the kernel by reference, or federated local?'
  - 'Consumption: synchronous validate / cached projection / frozen snapshot?'
  - 'Temporal contract: store the code + as-of date, never the label?'
  lands_in: vocabularies with kernel binding; canonical mappings; interfaces with event schema versions and spine keys
  enforced_by: kernel contracts (resolve/validate/subscribe/map + resolve_party); the spec-time register test; the generated conformance declaration
