# Skeleton decision inventory — instantiated from the nine dimension templates.
# Every record is an OPEN TO_CONFIRM slot; fill it in during elicitation (a source answer
# moves it to VERIFIED, or sign a waiver). Do not generate from a skeleton (§7.3 stop rule).
inventory:
  slice: DMBB-APPROVAL
  schema_version: 0.1.0
decisions:
- id: DR-DMBBAP-001
  dimension: behavioural_state
  question: What is the complete life story of cmApproval — its statuses, the allowed moves, and the edge moves everyone forgets?
  answer: OPEN — to be answered in elicitation.
  status: TO_CONFIRM
  owner: TBD
  source:
    kind: assumption
    ref: unanswered behavioural_state template slot (cmApproval)
  x-probes:
  - Which states exist, and which transitions between them are allowed?
  - What is the edge move that gets forgotten (e.g. a missed payment later settled)?
  - Which state is terminal, and which transitions are refused (nothing written)?
  lands_in: entities.cmApproval.lifecycle
  enforced_by: lifecycle-projector -> status-framework
  scenario_refs: []
- id: DR-DMBBAP-002
  dimension: computation
  question: What is the exact recipe of materiality — what is included, excluded, and as of when?
  answer: OPEN — to be answered in elicitation.
  status: TO_CONFIRM
  owner: TBD
  source:
    kind: assumption
    ref: unanswered computation template slot (materiality)
  x-probes:
  - Write the formula over named fields (numerator, denominator, population).
  - In-period or cumulative? Which as-of date governs?
  - Which line components count (disputed, suspended, per-category)?
  lands_in: rules.materiality
  enforced_by: generated rules and queries
- id: DR-DMBBAP-003
  dimension: interpretation
  question: What is the one agreed reading of authority_matrix — cumulative or exact, and what covers the top band?
  answer: OPEN — to be answered in elicitation.
  status: TO_CONFIRM
  owner: TBD
  source:
    kind: assumption
    ref: unanswered interpretation template slot (authority_matrix)
  x-probes:
  - If a case is category N, are lower-category actions also available (cumulative) or only N's (exact)?
  - What covers the band above the last enumerated row (is there an implied top band)?
  - Normalise the table to data + the interpretation, with full range coverage.
  lands_in: rules.authority_matrix
  enforced_by: generated rules / seed data
- id: DR-DMBBAP-004
  dimension: failure_behaviour
  question: What happens when approval_engine is down, stale, or empty?
  answer: OPEN — to be answered in elicitation.
  status: TO_CONFIRM
  owner: TBD
  source:
    kind: assumption
    ref: unanswered failure_behaviour template slot (approval_engine)
  x-probes:
  - Skip, retry, or create a provisional record? Never fabricate?
  - What is blocked downstream until the dependency recovers?
  - Absent value -> N/A render, default, or hard stop?
  lands_in: interfaces.approval_engine.on_failure
  enforced_by: adapter configuration, guards
- id: DR-DMBBAP-005
  dimension: grain_keys
  question: What is the grain of cmApproval, and what makes two records duplicates?
  answer: OPEN — to be answered in elicitation.
  status: TO_CONFIRM
  owner: TBD
  source:
    kind: assumption
    ref: unanswered grain_keys template slot (cmApproval)
