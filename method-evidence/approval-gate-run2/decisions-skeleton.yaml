- id: DR-DMBBAP-006
  dimension: work_workspace
  question: What does 'the DMBB-APPROVAL slice' mean as a workspace — the personas, daily volumes, and the columns and filters officers actually use?
  answer: OPEN — to be answered in elicitation.
  status: TO_CONFIRM
  owner: TBD
  source:
    kind: assumption
    ref: unanswered work_workspace template slot (DMBB-APPROVAL)
  x-probes:
  - Which persona owns this list; what is their daily volume?
  - What does 'my work' mean here (assigned-to-me, my-team, my-queue)?
  - Which columns, default filter and sort do they actually use?
