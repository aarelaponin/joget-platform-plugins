- id: DR-DMBBAP-007
  dimension: policy_change
  question: Who may change the DMBB-APPROVAL slice later, and how — an operated lever or a standing definition?
  answer: OPEN — to be answered in elicitation.
  status: TO_CONFIRM
  owner: TBD
  source:
    kind: assumption
    ref: unanswered policy_change template slot (DMBB-APPROVAL)
  x-probes:
  - 'Operate-vs-define (CP-2): a lever someone pulls to manage the work (Zone A), or a definition then selected (Zone B)?'
  - 'Configurability class (CP-9): Y (UI) / P (parameters only) / N (fixed — a change request)?'
  - 'Change owner + cadence (CP-1/7): who changes it, how often, on what trigger?'
  - 'Governance (§8): approval path; approval-gated; impact preview of live cases re-categorised?'
  - 'Config effective-dating: is the configuration itself versioned with validity windows and rollback?'
  enforced_by: per-zone admin consoles; config invariants INV-1..5 as validation rules
- id: DR-DMBBAP-008
