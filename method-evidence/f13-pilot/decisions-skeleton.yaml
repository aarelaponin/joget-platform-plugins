- id: DR-DMBBF1-001
  dimension: behavioural_state
  question: What is the complete life story of dmPayment — its statuses, the allowed moves, and the edge moves everyone forgets?
  answer: OPEN — to be answered in elicitation.
  status: TO_CONFIRM
  owner: TBD
  source:
    kind: assumption
    ref: unanswered behavioural_state template slot (dmPayment)
  x-probes: &id001
  - Which states exist, and which transitions between them are allowed?
  - What is the edge move that gets forgotten (e.g. a missed payment later settled)?
  - Which state is terminal, and which transitions are refused (nothing written)?
  lands_in: entities.dmPayment.lifecycle
  enforced_by: lifecycle-projector -> status-framework
