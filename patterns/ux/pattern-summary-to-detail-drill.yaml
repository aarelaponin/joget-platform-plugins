id: summary-to-detail-drill
name: Summary drills to the rows beneath it
applies_to: datalist
rule: "A summary cell / row action links to the detail list filtered by the summary key (click a total, see exactly its rows)."
realised_by: >-
  gen_datalists.py rowActions + per-column drill (HyperlinkDataListAction) -> list_detail?<param>=<key>;
  the same #requestParam# feeds the filter and the inbound drill (one mechanism).
maturity: stable      # T-23.3/T-23.4 (?fcat=C5 shows only C5)
source: "DMBB-UX-QA FIS §1.3, design decision A1"
deferred: ["aging-band -> debtors drill (band-label<->range mapping)"]
