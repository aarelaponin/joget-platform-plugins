# Planned — see docs/MIGRATION-BACKLOG.md and docs/CONSOLIDATION-PLAN.md.
# ---------------------------------------------------------------------------
planned:

  # Foundation capabilities currently trapped inside a case-management app (cmbb-plugins).
  # Horizontal, NOT case-specific — extract in dependency order (event-chain first).
  - id: joget-event-chain
    category: foundation
    tier: P
    ships: code
    note: CaseEventWriter/ChainVerifyService/CaseRefGenerator (hash-chained integrity log).
  - id: joget-status-manager
    category: foundation
    tier: P
    ships: code
    note: StatusManager/MmConfigService/GuardContext/TransitionGuard/GuardPhase (config-driven state machine).
  - id: joget-decision-approval
    category: foundation
    tier: P
    ships: code
    note: >
      ApprovalService/ApprovalInbox/AuthorityResolver/MatrixValidator + gate/delegate/sweep engines.
      INVERT the ApprovalEffects->engine coupling (consumer-registered DecisionEffect SPI).
      See docs/DAS-EXTRACTION-PLAN.md.

  # Domain packs — sourced from across projects + the KP4 net-new BB connectors.
  - id: pack-registration
    category: pack:registration
    govstack_bb: [Registration, Identity]
    tier: P
    ships: code
    note: identity-resolver (Identity adapter) + application wizard + decision/entitlement, from lst-frm gs-plugins.
  - id: pack-payments
    category: pack:payments
    govstack_bb: [Payments]
    tier: P
    ships: code
    note: payment-rail disbursement adapter (net-new; nearest ancestor = internal PaymentEngine + GAM reconciliation).
  - id: pack-information-mediator
    category: pack:information-mediator
    govstack_bb: [Information Mediator]
    tier: P
    ships: code
    note: X-Road / GovStack-IM client connector (net-new; server-side seed = govstack-api-sample).
