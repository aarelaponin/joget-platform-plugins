# joget-platform-plugins — plugin registry (single source of truth)
#
# One entry per reusable plugin. This is the seam between this repo (the Java runtime
# artefacts) and joget-spec-kit (which generates config against the `contract` below
# WITHOUT importing any Java). A CI check keeps this file in step with the built modules
# (see docs/CONVENTIONS in README). Schema: docs/registry.schema.yaml.
#
# tier:     G = generic-Joget (any app) · P = pattern-reusable (genericised then shipped)
# status:   active | planned | deprecated
# ships:    code | pattern            (code = the JAR ships; pattern = design ships, not code)

registry_version: 0.2.0

plugins:

  - id: joget-form-prefill
    module: plugins/joget-form-prefill
    artifact: com.fiscaladmin.joget:joget-form-prefill
    version: 1.0.0
    tier: G
    status: active
    ships: code
    license: proprietary            # FiscalAdmin OÜ; candidate to open-source (see backlog)
    dx_compat: ["8.1", "9.x"]
    java_release: 11
    summary: >
      Configurable form LOAD binder that pre-populates a NEW record from a related
      record by configuration only (no per-form Java). Replaces URL-param prefill and
      hand-written per-form load binders.
    registers:
      - com.fiscaladmin.joget.formprefill.FormPrefillLoadBinder
    contract:                       # config keys = public API generators target (MAJOR bump if changed)
      binder_class: com.fiscaladmin.joget.formprefill.FormPrefillLoadBinder
      config_keys:
        - enabled
        - onlyOnAdd
        - keySources          # [{source: requestParam|loginUser|currentField, name}]
        - formId
        - table
        - matchField
        - filters             # [{field, op: eq|ne, value}]
        - orderBy
        - orderNumeric
        - pickFirst
        - related             # [{formId, table, keyFrom, alias}]
        - mappings            # [{from, to}]
        - constants           # [{to, value}]
    provenance: proven in production public-sector implementations (DX8 + DX9), multi-instance
    source_of_truth: this repo   # promoted from 03_debt_management/shared-plugins (now retired)

  - id: form-creator-api
    module: plugins/form-creator-api
    artifact: global.govstack:form-creator-api
    version: 8.1-SNAPSHOT
    tier: G
    status: active
    ships: code
    license: govstack             # global.govstack
    dx_compat: ["8.1"]            # 9.x not yet verified
    java_release: 11
    summary: >
      Programmatic Joget artefact-creation backbone: creates forms, datalists, userviews,
      CRUD and API-Builder endpoints, and seeds fixtures, over a REST API. The push-tooling
      spine used by the spec-driven pipelines.
    registers:
      - global.govstack.formcreator.lib.FormCreatorServiceProvider
    contract:                       # this is an API plugin — its contract is the OpenAPI + payload keys
      api_spec: docs/formCreatorApi-openapi.yaml
      config_keys:
        - appId
        - formJson
        - formIds
        - datalistJson
        - userviewJson
    provenance: proven push tooling across production public-sector implementations
    source_of_truth: this repo   # promoted from lst-frm-prj/plugins (client refs scrubbed)

  - id: joget-status-framework
    module: "(external — own repo)"
    artifact: global.govstack:joget-status-framework
    version: 8.1-SNAPSHOT
    tier: G
    status: active
    ships: code
    license: Apache-2.0
    dx_compat: ["8.1", "9.x"]
    java_release: 11
    summary: >
      Config-driven status lifecycle + audit-trail framework for Joget records. Already a
      standalone, open-licensed repo — consumed here by version pin, NOT vendored.
    provenance: proven in production public-sector implementations (multi-project)
    source_of_truth: https://github.com/aarelaponin/joget-status-framework

# ---------------------------------------------------------------------------
# Planned promotions — see docs/MIGRATION-BACKLOG.md for the full extraction plan.
# Listed here so the registry is the one place to see the whole platform surface.
# ---------------------------------------------------------------------------
