  - id: joget-event-chain
    module: plugins/joget-event-chain
    artifact: com.fiscaladmin.joget:joget-event-chain
    version: 1.0.0
    category: foundation
    tier: P
    status: active
    ships: code
    license: proprietary            # FiscalAdmin OÜ
    dx_compat: ["8.1", "9.x"]
    java_release: 11
    summary: >
      Tamper-evident, append-only case event log: a SHA-256 hash-chained event writer,
      a read-only chain verifier, and a configurable human case-reference generator.
      Library bundle (exports com.fiscaladmin.joget.eventchain) — no Joget plugin descriptors;
      consumed by other engine plugins. The event/case table ids are configurable so any
      consumer points it at its own carriers.
    registers: []                   # library — exports a package, registers no Joget plugins
    contract:
      exports_package: com.fiscaladmin.joget.eventchain
      classes: [CaseEventWriter, ChainVerifyService, CaseRefGenerator]
      config_keys: [eventFormId, caseFormId]   # via constructor arg or setDefaultEventFormId
    provenance: extracted + genericised from a collection-management building block (Phase 2, item 6)
    source_of_truth: this repo

  - id: joget-status-manager
    module: plugins/joget-status-manager
    artifact: com.fiscaladmin.joget:joget-status-manager
    version: 1.0.0
    category: foundation
    tier: P
    status: active
    ships: code
    license: proprietary            # FiscalAdmin OÜ
    dx_compat: ["8.1", "9.x"]
    java_release: 11
    depends_on: [joget-event-chain]
    summary: >
      Config-driven status state machine (StatusManager) whose lifecycle lives in metamodel
      tables (states + transitions, read via MmConfigService), with per-dimension scope
      resolution and audited transitions to the event chain. Also ships the guard-phase SPI
      (GuardPhase + GuardContext) so a consumer composes its own case-envelope guard from
      its own phases. Library bundle (exports com.fiscaladmin.joget.statusmanager).
    registers: []                   # library — exports a package, registers no Joget plugins
    contract:
      exports_package: com.fiscaladmin.joget.statusmanager
      classes: [StatusManager, MmConfigService, GuardContext, GuardPhase, InvalidTransitionException]
      metamodel_tables: [mmCaseType, mmState, mmTransition, mmDocReq, mmEntityState, mmEntityTransition]
      config_keys: [caseFormId, taskFormId, docFormId]   # GuardContext.setFormIds; event id via event-chain
    provenance: extracted + genericised from a collection-management building block (Phase 2, item 5);
                domain phases (open/pre-close/close) + the case-envelope plugin stay in the consumer
    source_of_truth: this repo

  - id: joget-decision-approval
    module: plugins/joget-decision-approval
    artifact: com.fiscaladmin.joget:joget-decision-approval
    version: 1.0.0
    category: foundation
    tier: P
    status: active            # 3a+3b: full service core shipped; Joget-plugin engines/binder pending (3c)
    ships: code
    license: proprietary            # FiscalAdmin OÜ
    dx_compat: ["8.1", "9.x"]
    java_release: 11
    depends_on: [joget-event-chain, joget-status-manager]
    summary: >
      Configurable decision & approval service. Ships the inversion seam — the DecisionEffect SPI
      and a static DecisionEffects registry the consumer's Activator populates, so the approval
      service never names a domain service — plus the full service core: ApprovalService (authority-
      matrix routing SINGLE/CHAIN/QUORUM, rank gate, four-eyes SoD, COI + auto-COI, escalation/timeout
      sweep, delegation binding, all audited to the event chain and guarded by StatusManager),
      DecisionService, AuthorityResolver (directory-resolved rank), MatrixValidator, ApprovalInbox,
      and a Rows helper. The Joget-plugin wrappers (gate/sweep/delegate/authority-matrix engines +
      inbox binder + Activator/descriptors) are the next increment (see DAS-EXTRACTION-PLAN.md §3c).
    registers:
      - com.fiscaladmin.joget.approval.ApprovalGateEngine
      - com.fiscaladmin.joget.approval.ApprovalSweepEngine
      - com.fiscaladmin.joget.approval.ApprovalDelegateEngine
      - com.fiscaladmin.joget.approval.AuthorityMatrixEngine
      - com.fiscaladmin.joget.approval.ApprovalInboxBinder
    contract:
      exports_package: com.fiscaladmin.joget.approval
      classes: [DecisionEffect, DecisionEffects, ApprovalService, DecisionService, AuthorityResolver,
                MatrixValidator, ApprovalInbox, Rows]
      plugins: [ApprovalGateEngine, ApprovalSweepEngine, ApprovalDelegateEngine,
                AuthorityMatrixEngine, ApprovalInboxBinder]
      triggers: [cmApprovalDecision, cmApprovalSweep, cmApprovalDelegate, cmAuthorityCheck]
      spi: "consumer registers DecisionEffects.register(actionType, effect) at Activator start-up"
      carriers: [cmApproval, cmDecision, mmAuthority, mmCoi, mmRoleLevel, cmCase]
    provenance: extracted + genericised from a collection-management building block (Phase 2, item 4)
    source_of_truth: this repo

  - id: joget-case-ops
    module: plugins/joget-case-ops
    artifact: com.fiscaladmin.joget:joget-case-ops
    version: 1.0.0
    category: foundation
    tier: P
    status: active
    ships: code
    license: proprietary            # FiscalAdmin OÜ
    dx_compat: ["8.1", "9.x"]
    java_release: 11
    depends_on: [joget-event-chain, joget-status-manager]
    summary: >
      Small, project-neutral case side-effect services: LinkService (typed reciprocal
      record-link with target-type validation), HoldService (assert/release holds with
      suppression/financial scopes), and PendingInfoService (park a case in its OnHold
      envelope + open a PROVIDE_INFO task on request; restore the prior state + close the
      task on response). All append audit events to the event chain and take configurable
      carrier-table ids; the OnHold envelope lookup uses the status-manager MmConfigService.
      Library bundle (exports com.fiscaladmin.joget.caseops).
    registers: []                   # library — exports a package, registers no Joget plugins
    contract:
      exports_package: com.fiscaladmin.joget.caseops
      classes: [LinkService, HoldService, PendingInfoService, CaseOpsSupport]
      config_keys: [linkFormId, linkTypeFormId, caseFormId, holdFormId, releaseFormId, requestFormId, responseFormId, taskFormId]
      carriers: [caseLink, linkType, hold, holdRelease, case, infoRequest, infoResponse, task]
    provenance: extracted + genericised from a collection-management building block (Phase 2, item 7);
                deadline/SLA deferred (DeadlineService is the bundle's 164-use utility hub)
    source_of_truth: this repo

  - id: joget-sla
    module: plugins/joget-sla
    artifact: com.fiscaladmin.joget:joget-sla
    version: 1.0.0
    category: foundation
    tier: P
    status: active
    ships: code
    license: proprietary            # FiscalAdmin OÜ
    dx_compat: ["8.1", "9.x"]
    java_release: 11
    depends_on: [joget-event-chain]
    summary: >
      Configurable SLA-clock engine (DeadlineService): creates per-case deadline clocks from SLA
      config, sweeps warn/critical/breach, pauses/resumes on hold, and escalates once per level
      (notify + priority bump + reassign), all audited to the event chain. Reads config through a
      small SlaConfig interface the consumer implements; carrier-table ids, the supervisor role and
      the optional escalation payload fields are configurable. Library bundle (exports
      com.fiscaladmin.joget.sla).
    registers: []                   # library — exports a package, registers no Joget plugins
    contract:
      exports_package: com.fiscaladmin.joget.sla
      classes: [DeadlineService, SlaConfig]
      spi: "consumer implements SlaConfig (slaRows/slaRow/calendarRow/allTerminalCodes/envelopeOf)"
      config_keys: [deadlineFormId, caseFormId, supervisorRole, taxpayerField, amountField]
      carriers: [caseDeadline, case]   # + the consumer's SLA/calendar config behind SlaConfig
    provenance: extracted + genericised from a collection-management building block (Phase 2, item 7b);
                required first untangling DeadlineService's static helpers into a neutral Props util
    source_of_truth: this repo

  - id: joget-tenant
    module: plugins/joget-tenant
    artifact: com.fiscaladmin.joget:joget-tenant
    version: 1.0.0
    category: foundation
    tier: P
    status: active
    ships: code
    license: proprietary            # FiscalAdmin OÜ
