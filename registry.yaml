# joget-platform-plugins — plugin registry (single source of truth)
#
# This is the shared runtime-extension library for ANY spec-to-code-on-Joget development.
# It is NOT GovStack-specific: GovStack Building Blocks are one (important) tagging vocabulary,
# not the organising axis. joget-spec-kit generates config against the `contract` of each entry
# WITHOUT importing any Java. Schema: docs/registry.schema.yaml.
#
# TAXONOMY
#   category:
#     foundation        horizontal capability, domain-agnostic — works for any Joget app
#     pack:<domain>      capability aligned to a domain (e.g. pack:registration, pack:payments)
#   govstack_bb:         OPTIONAL tag on packs that align to a GovStack Building Block. Verified
#                        vocabulary (specs.govstack.global, 2025 release):
#                        Cloud Infrastructure · Consent · Content Management System ·
#                        Digital Registries · E-Marketplace · E-Signature · GIS · Identity ·
#                        Information Mediator · Messaging · Payments · Registration · Scheduler · Wallet
#
# tier:   G = generic-Joget (any app) · P = pattern-reusable (genericised then shipped)
# status: active | planned | deprecated      ships: code | pattern

registry_version: 0.4.0

plugins:

  - id: joget-form-prefill
    module: plugins/joget-form-prefill
    artifact: com.fiscaladmin.joget:joget-form-prefill
    version: 1.0.0
    category: foundation
    tier: G
    status: active
    ships: code
    license: proprietary            # FiscalAdmin OÜ; candidate to open-source (see backlog)
    dx_compat: ["8.1", "9.x"]
    java_release: 11
    summary: >
      Configurable form LOAD binder that pre-populates a NEW record from a related
      record by configuration only (no per-form Java).
    registers:
      - com.fiscaladmin.joget.formprefill.FormPrefillLoadBinder
    contract:
      binder_class: com.fiscaladmin.joget.formprefill.FormPrefillLoadBinder
      config_keys: [enabled, onlyOnAdd, keySources, formId, table, matchField,
                    filters, orderBy, orderNumeric, pickFirst, related, mappings, constants]
    provenance: proven in production public-sector implementations (DX8 + DX9), multi-instance
    source_of_truth: this repo   # promoted from 03_debt_management/shared-plugins

  - id: form-creator-api
    module: plugins/form-creator-api
    artifact: global.govstack:form-creator-api
    version: 8.1-SNAPSHOT
    category: foundation
    tier: G
    status: active
    ships: code
    license: govstack
    dx_compat: ["8.1"]
    java_release: 11
    summary: >
      Programmatic Joget artefact-creation backbone: creates forms, datalists, userviews,
      CRUD and API-Builder endpoints, and seeds fixtures, over a REST API.
    registers:
      - global.govstack.formcreator.lib.FormCreatorServiceProvider
    contract:
      api_spec: docs/formCreatorApi-openapi.yaml
      config_keys: [appId, formJson, formIds, datalistJson, userviewJson]
    provenance: proven push tooling across production public-sector implementations
    source_of_truth: this repo   # promoted from lst-frm-prj/plugins (client refs scrubbed)

  - id: joget-lookup-field
    module: plugins/joget-lookup-field
    artifact: global.govstack:joget-lookup-field
    version: 8.1-SNAPSHOT
    category: foundation
    tier: G
    status: active
    ships: code
    license: govstack
    dx_compat: ["8.1", "9.x"]
    java_release: 17
    summary: >
      Form element that watches a SelectBox and auto-populates fields from a related record
      (field-level, live). Complements joget-form-prefill (form-level, on-load).
    registers:
      - global.govstack.lookupfield.LookupFieldElement
    contract:
      element_class: global.govstack.lookupfield.LookupFieldElement
      config_keys: [sourceFieldId, lookupFormId, lookupColumn, lookupKeyColumn, updateOn, displayType]
    provenance: promoted from lst-frm-prj/plugins (project-neutral source)
    source_of_truth: this repo

  - id: joget-status-framework
    module: "(external — own repo)"
    artifact: global.govstack:joget-status-framework
    version: 8.1-SNAPSHOT
    category: foundation
    tier: G
    status: active
    ships: code
    license: Apache-2.0
    dx_compat: ["8.1", "9.x"]
    java_release: 11
    summary: >
      Config-driven status lifecycle + audit-trail framework for Joget records. Already a
      standalone, open-licensed repo — consumed here by version pin, NOT vendored.
    provenance: proven in production public-sector implementations (multi-project)
    source_of_truth: https://github.com/aarelaponin/joget-status-framework

